name: Deploy to GitHub Pages

# Deploys the static site (game at /, dashboard at /dashboard.html) to GitHub Pages.
on:
  push:
    branches:
      - main
      - claude/repo-contents-overview-lwbe1p
  workflow_dispatch:

# Permissions required by the GitHub Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the repository root as the site.
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
