<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cacao Farm — Mobile Money</title>
    <link rel="stylesheet" href="game.css">
    <script type="importmap">
    {
        "imports": {
            "three": "./three.module.js"
        }
    }
    </script>
</head>
<body>
    <!-- Canvas 3D injecté ici par Three.js -->
    <div id="game-root"></div>

    <!-- INTERFACE (HUD) -->
    <div id="hud">
        <!-- Barre du haut : ressources -->
        <div class="top-bar">
            <div class="resource" id="res-cacao">
                <span class="res-icon">🍫</span>
                <span class="res-value" id="cacaoValue">0</span>
                <span class="res-label">Cacao</span>
            </div>
            <div class="resource" id="res-money">
                <span class="res-icon">📱</span>
                <span class="res-value" id="moneyValue">0</span>
                <span class="res-label">FCFA</span>
            </div>
        </div>

        <!-- Bannière d'objectif guidé -->
        <div class="objective" id="objective">
            <div class="objective-step" id="objectiveStep">Étape 1</div>
            <div class="objective-text" id="objectiveText">Récolte 3 cabosses de cacao 🌳</div>
            <div class="objective-progress" id="objectiveProgress"></div>
        </div>

        <!-- Bouton d'action contextuel -->
        <button id="actionBtn" class="action-btn hidden">
            <span id="actionLabel">Action</span>
        </button>

        <!-- Joystick virtuel -->
        <div id="joystick" class="joystick">
            <div id="joystickKnob" class="joystick-knob"></div>
        </div>

        <!-- Aide clavier (desktop) -->
        <div class="hint">Déplace-toi : joystick ou WASD / flèches • Action : bouton ou Espace</div>
    </div>

    <!-- Écran de démarrage -->
    <div id="startScreen">
        <div class="start-card">
            <h1>🍫 Cacao Farm</h1>
            <p>Récolte le cacao, recharge ton Mobile Money en <strong>FCFA</strong>, et achète du cacao au marché.</p>
            <button id="startBtn">▶ Jouer</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
